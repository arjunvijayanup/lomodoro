<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lomodoro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>

    <div class="container">

      <div class="header-bar">

        <!-- Header -->
        <h1 class="app-title">Lomodoro</h1>
        <button class="btn-settings" id="settings-btn" aria-label="Settings">&#9881;</button>

      </div>

      <!-- Session label: shows "Work" or "Break" -->
      <p class="session-label" id="session-label">Work Session</p>

      <!-- The big countdown display -->
      <div class="timer-display" id="timer-display">25:00</div>

      <!-- Timer control buttons -->
      <div class="timer-controls">
        <button class="btn btn-primary" id="start-btn">Start</button>
        <button class="btn btn-secondary" id="reset-btn">Reset</button>
      </div>

      <div class="divider"></div>

      <div class="lofi-section">
        <p class="lofi-label">LoFi Stream</p>
        <div class="music-controls">
          <button class="btn btn-music" id="yt-play-btn">PLAY</button>
          <input type="range" id="yt-volume" min="0" max="100" value="50" />
        </div>
      </div>

      <a class="attribution" href="https://ilovemusic.de" target="_blank">powered by ilovemusic.de</a>
      
      <div class="settings-overlay" id="settings-overlay">
        <div class="settings-panel">

          <div class="settings-header">
            <span class="settings-title">Settings</span>
            <button class="btn-settings-close" id="settings-close-btn" aria-label="Close">&#10005;</button>
          </div>

          <div class="duration-picker">
            <p class="picker-label">Session length</p>
            <div class="picker-row">
              <button class="btn btn-arrow" id="work-dec-btn">&#8249;</button>
              <span class="picker-value" id="work-value">25 min.</span>
              <button class="btn btn-arrow" id="work-inc-btn">&#8250;</button>
            </div>
            <div class="picker-row picker-row-fine">
              <button class="btn btn-picker-step" id="work-minus5-btn">&minus; 5 min.</button>
              <button class="btn btn-picker-step" id="work-plus5-btn">+ 5 min.</button>
            </div>
          </div>

          <div class="duration-picker">
            <p class="picker-label">Break length</p>
            <div class="picker-row">
              <button class="btn btn-arrow" id="break-dec-btn">&#8249;</button>
              <span class="picker-value" id="break-value">5 min.</span>
              <button class="btn btn-arrow" id="break-inc-btn">&#8250;</button>
            </div>
            <div class="picker-row picker-row-fine">
              <button class="btn btn-picker-step" id="break-minus5-btn">&minus; 5 min.</button>
              <button class="btn btn-picker-step" id="break-plus5-btn">+ 5 min.</button>
            </div>
          </div>

        </div>
      </div>
    
    </div>

    <script src="popup.js"></script>
  </body>
</html>
